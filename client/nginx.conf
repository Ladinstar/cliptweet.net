server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Issue relative redirects (e.g. /fr -> /fr/) so the host:port is preserved
  # behind a port mapping / reverse proxy.
  absolute_redirect off;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # --- Security headers (applied to the HTML document responses) ---
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), browsing-topics=()" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://pagead2.googlesyndication.com https://*.googlesyndication.com https://www.google-analytics.com https://js.sentry-cdn.com https://browser.sentry-cdn.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; media-src 'self' blob: https://*.twimg.com; connect-src 'self' https://*.google-analytics.com https://*.analytics.google.com https://*.googlesyndication.com https://*.doubleclick.net https://*.sentry.io https://*.ingest.sentry.io; frame-src https://*.googlesyndication.com https://*.doubleclick.net https://www.google.com" always;

  # Long cache for Next.js hashed build assets.
  location /_next/static/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Reverse-proxy the API to the backend container (resolved on the Docker network).
  location /api/ {
    add_header X-Robots-Tag "noindex, nofollow" always;
    proxy_pass http://api:4000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Streaming downloads can be large; don't buffer or time out early.
    proxy_buffering off;
    proxy_read_timeout 300s;
    client_max_body_size 1m;
  }

  # Next generates the OG image as an extensionless file — serve it as PNG.
  location = /opengraph-image {
    default_type image/png;
    add_header Cache-Control "public, max-age=86400";
    try_files $uri =404;
  }

  location = /manifest.webmanifest {
    default_type application/manifest+json;
    try_files $uri =404;
  }

  # SPA fallback for client-side routing.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
